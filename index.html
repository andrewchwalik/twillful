<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Twillful | Creative Marketing Studio</title>
  <meta
    name="description"
    content="Twillful is a creative marketing studio focused on content creation and website design for brands that want sharper digital presence."
  />
  <meta name="theme-color" content="#95b475" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@500;700;800&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: "#95b475",
            brandBright: "#bfd4a7",
            brandDeep: "#3f5a2c",
            mist: "#eef5e8",
            ink: "#142012",
            olive: "#61774d"
          },
          fontFamily: {
            sans: ["Manrope", "sans-serif"],
            display: ["Canva Sans", "Manrope", "sans-serif"],
            accent: ["Syne", "sans-serif"]
          },
          boxShadow: {
            glow: "0 35px 80px rgba(176, 255, 211, 0.22)",
            soft: "0 28px 80px rgba(20, 32, 18, 0.15)"
          }
        }
      }
    };
  </script>

  <style>
    :root {
      --brand: #95b475;
      --brand-bright: #bfd4a7;
      --brand-deep: #3f5a2c;
      --mist: #eef5e8;
      --ink: #142012;
      --olive: #61774d;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--mist);
      font-family: "Manrope", sans-serif;
      background:
        radial-gradient(circle at 50% 46%, rgba(234, 244, 217, 0.5), rgba(234, 244, 217, 0.03) 22%, rgba(0, 0, 0, 0) 44%),
        radial-gradient(circle at top center, rgba(223, 237, 207, 0.18), transparent 28%),
        linear-gradient(135deg, #6f9360 0%, #88aa6f 34%, #95b475 58%, #779866 100%);
      min-height: 100vh;
    }

    .hero-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.16), transparent 18%);
      pointer-events: none;
      opacity: 0.95;
    }

    .hero-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .hero-noise {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 3rem 3rem;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
      opacity: 0.18;
    }

    .section-panel {
      position: relative;
      overflow: hidden;
    }

    .section-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: inherit;
      pointer-events: none;
    }

    @keyframes float-arrow {
      0%,
      100% {
        transform: translateY(0);
        opacity: 0.72;
      }
      50% {
        transform: translateY(8px);
        opacity: 1;
      }
    }

    .scroll-arrow {
      animation: float-arrow 2.6s ease-in-out infinite;
    }

    @keyframes painter-drift {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(6px);
      }
    }

    @keyframes painter-peek {
      0%,
      48%,
      100% {
        transform: translateX(0);
      }
      56% {
        transform: translateX(40px);
      }
      64% {
        transform: translateX(58px);
      }
      74% {
        transform: translateX(50px);
      }
      86% {
        transform: translateX(0);
      }
    }

    @keyframes painter-arm {
      0%,
      36%,
      100% {
        transform: rotate(-7deg) translateY(0);
        opacity: 1;
      }
      10% {
        transform: rotate(4deg) translateY(-5px);
      }
      22% {
        transform: rotate(-10deg) translateY(3px);
      }
      32% {
        transform: rotate(6deg) translateY(-4px);
      }
      44%,
      82% {
        transform: rotate(-16deg) translateY(10px);
        opacity: 0.35;
      }
    }

    @keyframes splatter-bloom {
      0%,
      10%,
      100% {
        opacity: 0;
        transform: scale(0.72);
      }
      16% {
        opacity: 0.95;
        transform: scale(1);
      }
      24% {
        opacity: 0;
        transform: scale(1.18);
      }
    }

    .painter-scene {
      animation: painter-drift 6.5s ease-in-out infinite;
    }

    .painter-head,
    .painter-arm,
    .splatter {
      transform-box: fill-box;
      transform-origin: center;
    }

    .painter-head {
      animation: painter-peek 7.4s cubic-bezier(0.2, 0.84, 0.2, 1) infinite;
    }

    .painter-arm {
      transform-origin: 100% 16%;
      animation: painter-arm 7.4s ease-in-out infinite;
    }

    .splatter {
      animation: splatter-bloom 7.4s ease-out infinite;
    }

    .splatter-delay-1 {
      animation-delay: 0.15s;
    }

    .splatter-delay-2 {
      animation-delay: 0.35s;
    }
  </style>
</head>

    function TwillfulSite() {
      return (

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<TwillfulSite />);
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
