<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Twillful | Creative Marketing Studio</title>
  <meta
    name="description"
    content="Twillful is a creative marketing studio focused on content creation and website design for brands that want sharper digital presence."
  />
  <meta name="theme-color" content="#95b475" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@500;700;800&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: "#95b475",
            brandBright: "#bfd4a7",
            brandDeep: "#3f5a2c",
            mist: "#eef5e8",
            ink: "#142012",
            olive: "#61774d"
          },
          fontFamily: {
            sans: ["Manrope", "sans-serif"],
            display: ["Canva Sans", "Manrope", "sans-serif"],
            accent: ["Syne", "sans-serif"]
          },
          boxShadow: {
            glow: "0 35px 80px rgba(176, 255, 211, 0.22)",
            soft: "0 28px 80px rgba(20, 32, 18, 0.15)"
          }
        }
      }
    };
  </script>

  <style>
    :root {
      --brand: #95b475;
      --brand-bright: #bfd4a7;
      --brand-deep: #3f5a2c;
      --mist: #eef5e8;
      --ink: #142012;
      --olive: #61774d;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--mist);
      font-family: "Manrope", sans-serif;
      background:
        radial-gradient(circle at 50% 46%, rgba(234, 244, 217, 0.5), rgba(234, 244, 217, 0.03) 22%, rgba(0, 0, 0, 0) 44%),
        radial-gradient(circle at top center, rgba(223, 237, 207, 0.18), transparent 28%),
        linear-gradient(135deg, #6f9360 0%, #88aa6f 34%, #95b475 58%, #779866 100%);
      min-height: 100vh;
    }

    .hero-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 48% 46%, rgba(255, 255, 255, 0.2), transparent 20%),
        radial-gradient(circle at 72% 36%, rgba(235, 245, 223, 0.14), transparent 26%);
      pointer-events: none;
      opacity: 0.98;
      animation: hero-ambient 12s ease-in-out infinite;
    }

    .hero-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .hero-noise {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 3rem 3rem;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
      opacity: 0.18;
    }

    .section-panel {
      position: relative;
      overflow: hidden;
    }

    .section-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: inherit;
      pointer-events: none;
    }

    @keyframes float-arrow {
      0%,
      100% {
        transform: translateY(0);
        opacity: 0.72;
      }
      50% {
        transform: translateY(8px);
        opacity: 1;
      }
    }

    .scroll-arrow {
      animation: float-arrow 2.6s ease-in-out infinite;
    }

    @keyframes hero-ambient {
      0%,
      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      50% {
        transform: translate3d(-1.4%, 0.8%, 0) scale(1.03);
      }
    }

    .mockup-stage {
      transform: translateY(0);
    }

    @keyframes decor-float-a {
      0%,
      100% {
        transform: translateY(0) rotate(-2deg);
        opacity: 0.68;
      }
      50% {
        transform: translateY(-8px) rotate(1deg);
        opacity: 0.95;
      }
    }

    @keyframes decor-float-b {
      0%,
      100% {
        transform: translateY(0) rotate(1deg);
        opacity: 0.55;
      }
      50% {
        transform: translateY(6px) rotate(-2deg);
        opacity: 0.86;
      }
    }

    @keyframes decor-float-c {
      0%,
      100% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.62;
      }
      50% {
        transform: translateY(-5px) rotate(3deg);
        opacity: 0.9;
      }
    }

    .hero-decor {
      pointer-events: none;
      user-select: none;
    }

    .decor-a {
      animation: decor-float-a 7.2s ease-in-out infinite;
    }

    .decor-b {
      animation: decor-float-b 8.1s ease-in-out infinite;
    }

    .decor-c {
      animation: decor-float-c 6.6s ease-in-out infinite;
    }

    .desktop-screen {
      position: absolute;
      left: 50%;
      top: 16.2%;
      width: min(577px, 86.6%);
      height: min(316px, 48.75%);
      transform: translateX(-50%);
      overflow: hidden;
      border-radius: 0.15rem;
      background: #000;
    }

    .desktop-scroll-track {
      position: absolute;
      inset: -3px;
    }

    .desktop-iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 1440px;
      height: 900px;
      transform: translate(-6px, -30px) scale(0.515);
      transform-origin: top left;
      border: 0;
      pointer-events: none;
    }

    .phone-screen {
      position: absolute;
      left: 31.6%;
      top: 12%;
      width: 37.4%;
      height: 80.2%;
      overflow: hidden;
      border-radius: 2.05rem;
      background: #000;
    }

    .phone-video {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 178%;
      height: 100%;
      transform: translate(-50%, -50%);
      transform-origin: center;
      border: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const services = [
      {
        number: "01",
        title: "Content Creation",
        text: "Social concepts, campaign assets, and brand storytelling designed to feel current and impossible to scroll past."
      },
      {
        number: "02",
        title: "Website Design",
        text: "Stronger digital homes for brands that need to look more intentional, premium, and conversion-ready."
      },
      {
        number: "03",
        title: "Creative Direction",
        text: "Visual systems and rollout direction that keep content, messaging, and web design speaking the same language."
      }
    ];

    const process = [
      {
        title: "Find the angle",
        text: "We sharpen the positioning first so the visuals and copy have a clear job to do."
      },
      {
        title: "Build the system",
        text: "We design the hero moments, content structure, and web experience around a cohesive visual direction."
      },
      {
        title: "Launch polished",
        text: "You leave with stronger creative, a cleaner web presence, and assets that can keep scaling with you."
      }
    ];

    function HeaderMockupScene() {
      return (
        <div className="mockup-stage relative mx-auto w-full max-w-[42rem] sm:max-w-[49rem] lg:max-w-[58rem]">
          <div className="relative mx-auto aspect-[1000/760] w-full">
            <div className="absolute left-[19.5%] top-[6.5%] w-[72.5%]">
              <div className="relative aspect-square w-full">
                <div className="desktop-screen">
                  <div className="desktop-scroll-track">
                    <iframe
                      className="desktop-iframe"
                      src="https://firelandsunited.com"
                      title="Firelands United homepage"
                      loading="eager"
                      tabIndex="-1"
                    />
                  </div>
                </div>
                <img
                  src="assets/header-design-elements/mac-desktop-mockup.png"
                  alt=""
                  aria-hidden="true"
                  className="absolute inset-0 h-full w-full select-none"
                />
              </div>
            </div>

            <div className="absolute left-[11%] top-[26%] w-[38.8%]" style={{ transform: "translate(-45px, 107px)" }}>
              <div className="relative aspect-square w-full">
                <div className="phone-screen">
                  <iframe
                    className="phone-video"
                    src="https://www.youtube.com/embed/__MMPLvXtXc?autoplay=1&mute=1&controls=0&loop=1&playlist=__MMPLvXtXc&playsinline=1&rel=0&modestbranding=1"
                    title="Twillful featured video"
                    allow="autoplay; encrypted-media; picture-in-picture"
                    allowFullScreen
                    tabIndex="-1"
                  />
                </div>
                <img
                  src="assets/header-design-elements/iphone-mockup.png"
                  alt=""
                  aria-hidden="true"
                  className="absolute inset-0 h-full w-full select-none"
                />
              </div>
            </div>
          </div>
        </div>
      );
    }

    function HeroDecor() {
      return (
        <div className="hero-decor absolute inset-0">
          <img
            src="assets/header-design-elements/stars.png"
            alt=""
            aria-hidden="true"
            className="decor-c absolute left-[33%] top-[7%] w-10 opacity-80 sm:w-14"
          />
          <img
            src="assets/header-design-elements/content-creation-underline-scribble.png"
            alt=""
            aria-hidden="true"
            className="decor-a absolute left-[16%] top-[50%] hidden w-44 opacity-78 sm:block md:w-56"
          />
          <img
            src="assets/header-design-elements/web-design-circle-scribble.png"
            alt=""
            aria-hidden="true"
            className="decor-b absolute right-[14%] top-[36%] hidden w-44 opacity-70 sm:block md:w-56"
            style={{ right: "calc(14% - 73px)", top: "calc(36% - 249px)" }}
          />
          <img
            src="assets/header-design-elements/digital-asset-production-scribble.png"
            alt=""
            aria-hidden="true"
            className="decor-a absolute right-[14%] top-[67%] hidden w-56 opacity-76 sm:block md:w-72"
            style={{ right: "calc(14% - 124px)", top: "calc(67% - 145px)" }}
          />
        </div>
      );
    }

    function TwillfulSite() {
      return (
        <div>
          <section className="hero-shell relative flex h-[100svh] flex-col overflow-hidden">
            <div className="hero-noise absolute inset-0" />

            <header className="relative z-10 flex items-start justify-between px-6 pb-0 pt-6 md:px-10 md:pt-10 lg:px-16">
              <a
                href="#top"
                className="block"
              >
                <div
                  className="font-display text-4xl font-extrabold tracking-[-0.06em] text-white sm:text-5xl md:text-6xl"
                  style={{ fontFamily: '"Canva Sans", "Manrope", sans-serif', fontWeight: 800 }}
                >
                  twillful.
                </div>
                <div className="mt-2 text-[10px] font-medium tracking-[0.34em] text-white/74 sm:text-[11px]">
                  creative content studio
                </div>
              </a>

              <div className="flex items-center gap-5">
                <a href="#contact" className="hidden text-sm font-bold uppercase tracking-[0.3em] text-white/92 md:block">
                  Hire Us
                </a>
                <a
                  href="#services"
                  className="flex h-16 w-16 items-center justify-center rounded-full bg-white text-brandDeep shadow-soft transition hover:scale-105"
                  aria-label="Jump to services"
                >
                  <div className="space-y-1.5">
                    <div className="h-0.5 w-8 bg-current" />
                    <div className="h-0.5 w-8 bg-current" />
                    <div className="h-0.5 w-8 bg-current" />
                  </div>
                </a>
              </div>
            </header>

            <main id="top" className="relative z-10 flex min-h-0 flex-1 flex-col justify-center px-6 pb-8 pt-2 md:px-10 md:pb-10 lg:px-16">
              <div className="relative mx-auto flex w-full max-w-[1600px] flex-1 flex-col justify-center">
                <div className="mx-auto -mt-4 text-center sm:-mt-8 md:-mt-10">
                  <HeroDecor />
                  <HeaderMockupScene />
                  <p className="mx-auto mt-6 max-w-[56rem] text-balance px-3 text-base font-medium leading-7 text-white/88 sm:mt-7 sm:text-lg md:text-xl md:leading-9">
                    Every brand has a story — Twillful brings it to life with creative content and immersive digital experiences.
                  </p>
                </div>

                <a
                  href="#services"
                  className="absolute bottom-3 left-1/2 flex -translate-x-1/2 flex-col items-center gap-2 text-white/92 transition hover:text-white md:bottom-4"
                  aria-label="Scroll for more content"
                >
                  <svg
                    width="18"
                    height="44"
                    viewBox="0 0 18 44"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                    className="scroll-arrow overflow-visible"
                  >
                    <path d="M9 1V38" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" />
                    <path d="M3 32L9 38L15 32" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                </a>
              </div>
            </main>
          </section>

          <section id="services" className="relative bg-[#14301f] px-6 pb-20 pt-20 md:px-10 md:pb-24 md:pt-24 lg:px-16">
            <div className="absolute inset-x-0 top-0 h-20 -translate-y-[99%] overflow-hidden md:h-28">
              <svg
                viewBox="0 0 1440 220"
                preserveAspectRatio="none"
                className="h-full w-full"
                aria-hidden="true"
              >
                <path
                  d="M0,22 C210,8 360,54 540,82 C760,116 970,102 1142,138 C1266,164 1366,198 1440,220 L1440,220 L0,220 Z"
                  fill="#14301f"
                />
              </svg>
            </div>

            <div className="mx-auto max-w-7xl">
              <div className="max-w-3xl">
                <div className="text-xs font-bold uppercase tracking-[0.42em] text-white/55">What We Do</div>
                <h2 className="mt-4 font-accent text-4xl font-bold tracking-tight text-white md:text-5xl">
                  A sharper front-end presence for brands that have outgrown looking average.
                </h2>
              </div>

              <div className="mt-10 grid gap-6 lg:grid-cols-3">
                {services.map((service) => (
                  <article
                    key={service.number}
                    className="section-panel rounded-[2rem] bg-white/8 p-8 backdrop-blur"
                  >
                    <div className="text-sm font-bold tracking-[0.35em] text-white/55">{service.number}</div>
                    <h3 className="mt-8 text-2xl font-extrabold text-white">{service.title}</h3>
                    <p className="mt-4 text-base leading-7 text-white/72">{service.text}</p>
                  </article>
                ))}
              </div>
            </div>
          </section>

          <section className="bg-[#eff4e8] px-6 py-20 text-ink md:px-10 lg:px-16">
            <div className="mx-auto grid max-w-7xl gap-10 lg:grid-cols-[1fr_1.1fr]">
              <div>
                <div className="text-xs font-bold uppercase tracking-[0.42em] text-olive">Why Twillful</div>
                <h2 className="mt-4 font-accent text-4xl font-bold tracking-tight md:text-5xl">
                  The goal is not more content. The goal is better presence.
                </h2>
                <p className="mt-6 max-w-xl text-lg leading-8 text-olive">
                  We work with brands that need a cleaner visual system, stronger storytelling, and a website that feels like the level they are trying to grow into.
                </p>
              </div>

              <div className="space-y-4">
                {process.map((step, index) => (
                  <div key={step.title} className="rounded-[2rem] border border-brandDeep/10 bg-white p-6 shadow-soft">
                    <div className="flex items-center gap-4">
                      <div className="flex h-11 w-11 items-center justify-center rounded-full bg-brand text-sm font-extrabold text-ink">
                        {index + 1}
                      </div>
                      <h3 className="text-2xl font-extrabold text-ink">{step.title}</h3>
                    </div>
                    <p className="mt-4 pl-14 text-base leading-7 text-olive">{step.text}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section id="contact" className="bg-[#0f2116] px-6 py-20 md:px-10 lg:px-16">
            <div className="mx-auto grid max-w-7xl gap-8 lg:grid-cols-[0.9fr_1.1fr]">
              <div className="section-panel rounded-[2rem] bg-white/8 p-8 text-white backdrop-blur">
                <div className="text-xs font-bold uppercase tracking-[0.42em] text-white/55">Contact</div>
                <h2 className="mt-4 font-accent text-4xl font-bold tracking-tight md:text-5xl">
                  Ready for a site and content system that feel more intentional?
                </h2>
                <p className="mt-6 max-w-xl text-lg leading-8 text-white/72">
                  Send a short brief and we will map the right next move for your brand, whether that is a web refresh, content direction, or both.
                </p>
              </div>

              <div className="section-panel rounded-[2rem] bg-brandDeep/55 p-8 backdrop-blur">
                <form className="grid gap-4 md:grid-cols-2">
                  <input
                    className="rounded-2xl border border-white/12 bg-white px-4 py-3 text-sm text-ink outline-none transition focus:border-brandDeep"
                    placeholder="Name"
                  />
                  <input
                    type="email"
                    className="rounded-2xl border border-white/12 bg-white px-4 py-3 text-sm text-ink outline-none transition focus:border-brandDeep"
                    placeholder="Email"
                  />
                  <input
                    className="rounded-2xl border border-white/12 bg-white px-4 py-3 text-sm text-ink outline-none transition focus:border-brandDeep md:col-span-2"
                    placeholder="Brand or company"
                  />
                  <textarea
                    rows="6"
                    className="rounded-2xl border border-white/12 bg-white px-4 py-3 text-sm text-ink outline-none transition focus:border-brandDeep md:col-span-2"
                    placeholder="What are you trying to improve?"
                  />
                  <button
                    type="button"
                    className="rounded-full bg-white px-6 py-3 text-sm font-extrabold uppercase tracking-[0.18em] text-brandDeep transition hover:bg-mist md:col-span-2"
                  >
                    Send Inquiry
                  </button>
                </form>
              </div>
            </div>
          </section>

          <footer className="bg-[#0f2116] px-6 pb-10 text-sm text-white/58 md:px-10 lg:px-16">
            <div className="mx-auto flex max-w-7xl flex-col gap-3 border-t border-white/10 pt-8 md:flex-row md:items-center md:justify-between">
              <div>© <span id="year"></span> twillful.</div>
              <div className="flex items-center gap-5">
                <a href="#services" className="transition hover:text-white">Services</a>
                <a href="#contact" className="transition hover:text-white">Contact</a>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<TwillfulSite />);
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
